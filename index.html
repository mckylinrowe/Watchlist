<script type="module" id="fb-init">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, doc, onSnapshot, setDoc, updateDoc, deleteDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCIKytJXq6yFDGGShcbIGpViyrsU7wzR5U",
    authDomain: "tiffany-watchlist.firebaseapp.com",
    projectId: "tiffany-watchlist",
    storageBucket: "tiffany-watchlist.firebasestorage.app",
    messagingSenderId: "374560916921",
    appId: "1:374560916921:web:e65e997728a6fe6dc1a268"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const colRef = collection(db, "movies");

  window.__fb = {
    onMovies: (cb) => onSnapshot(colRef, snap => {
      const movies = snap.docs.map(d => ({ ...d.data(), id: d.id }));
      cb(movies);
    }, err => {
      console.error("Firestore listen error:", err);
      window.dispatchEvent(new CustomEvent("fb-error", {detail: err.message}));
    }),
    upsert: (movie) => setDoc(doc(db, "movies", String(movie.id)), movie),
    update: (id, data) => updateDoc(doc(db, "movies", String(id)), data),
    remove: (id) => deleteDoc(doc(db, "movies", String(id))),
    getAll: () => getDocs(colRef).then(s => s.docs.map(d => ({ ...d.data(), id: d.id }))),
    clearAll: async () => {
      const snap = await getDocs(colRef);
      await Promise.all(snap.docs.map(d => deleteDoc(d.ref)));
    },
    testWrite: async () => {
      await setDoc(doc(db, "movies", "__test__"), {test: true});
      await deleteDoc(doc(db, "movies", "__test__"));
      return true;
    }
  };
  window.__fbReady = true;
  window.dispatchEvent(new Event("fb-ready"));
</script>

const tmdbFetch=url=>fetch(url,{headers:{Authorization:`Bearer ${TMDB_TOKEN}`}});

const buildEntry=(seed,d)=>{
  const genres=(d.genre_ids||d.genres?.map(g=>g.id)||[]).map(id=>GENRE_MAP[id]).filter(Boolean);
  const date=d.release_date||d.first_air_date||"";
  // seenBy is per-user array; queued means on the shared list but neither has seen it
  return{
    id:String(Date.now()+Math.floor(Math.random()*10000)),
    tmdbId:d.id,title:d.title||d.name||seed.title,
    year:date.slice(0,4)||seed.year,
    poster:d.poster_path?`${IMG_BASE}${d.poster_path}`:null,
    genres,primaryGenre:genres[0]||"Other",
    tmdbRating:d.vote_average?parseFloat(d.vote_average.toFixed(1)):null,
    overview:d.overview||"",tagline:d.tagline||"",runtime:d.runtime||null,
    mediaType:seed.mediaType,category:seed.category,
    seenBy:seed.seenBy||[],  // array of user names who've seen it
    ratings:{},  // {McKylin: 4, Tiffany: 3}
    notes:{},    // {McKylin: "great", Tiffany: "loved it"}
    streamer:seed.streamer||null,
    addedAt:new Date().toISOString(),
  };
};

// -- Discover Tab --------------------------------------------------------------
function DiscoverTab({movies,onAddToQueue}){
  const[genre,setGenre]=useState("");
  const[streamer,setStreamer]=useState("");
  const[minScore,setMinScore]=useState(7.0);
  const[discResults,setDiscResults]=useState([]);
  const[finding,setFinding]=useState(false);
  const[searched,setSearched]=useState(false);
  const[discError,setDiscError]=useState("");
  const existingIds=new Set(movies.map(m=>m.tmdbId).filter(Boolean));

  const findMovies=async()=>{
    setFinding(true);setSearched(true);setDiscResults([]);setDiscError("");
    const genreParam=genre?`&with_genres=${genre}`:"";
    const startPage=Math.floor(Math.random()*8)+1;
    try{
      const pages=await Promise.all([startPage,startPage+1,startPage+2].map(p=>
        fetch(`${TMDB_BASE}/discover/movie?api_key=${API_KEY}&sort_by=popularity.desc&vote_count.gte=150&vote_average.gte=${minScore}&language=en-US&include_adult=false${genreParam}&page=${p}`)
        .then(r=>{if(!r.ok)throw new Error(`HTTP ${r.status}`);return r.json();})
      ));
      const all=pages.flatMap(p=>p.results||[]);
      const seen=new Set();
      const unique=all.filter(r=>{if(seen.has(r.id)||!r.poster_path)return false;seen.add(r.id);return true;});
      const fresh=unique.filter(r=>!existingIds.has(r.id)).sort(()=>Math.random()-0.5);
      if(fresh.length===0)setDiscError("No new results &mdash; try a different genre or lower the score.");
      setDiscResults(fresh.slice(0,10));
    }catch(e){setDiscError(`Error: ${e.message}`);}
    setFinding(false);
  };

  const handleAdd=(movie)=>{
    const genres=(movie.genre_ids||[]).map(id=>GENRE_MAP[id]).filter(Boolean);
    const entry={
      id:String(Date.now()+Math.floor(Math.random()*10000)),
      tmdbId:movie.id,title:movie.title,
      year:(movie.release_date||"").slice(0,4)||"&mdash;",
      poster:movie.poster_path?`${IMG_BASE}${movie.poster_path}`:null,
      genres,primaryGenre:genres[0]||"Other",
      tmdbRating:movie.vote_average?parseFloat(movie.vote_average.toFixed(1)):null,
      overview:movie.overview||"",tagline:"",runtime:null,
      mediaType:"movie",category:"Tiffany",
      seenBy:[],ratings:{},notes:{},
      streamer:streamer||null,addedAt:new Date().toISOString(),
    };
    onAddToQueue(entry);
    setDiscResults(prev=>prev.filter(r=>r.id!==movie.id));
  };

  const genreOptions=Object.entries(GENRE_MAP).sort((a,b)=>a[1].localeCompare(b[1]));
  const pct=((minScore-5)/5*100).toFixed(1);

  return(
    <div style={{padding:"24px"}}>
      <div style={{background:"#0d0d0d",border:"1px solid #1a1a1a",borderRadius:"8px",padding:"20px",marginBottom:"24px",display:"flex",gap:"16px",flexWrap:"wrap",alignItems:"flex-end"}}>
        <div style={{flex:"1",minWidth:"130px"}}>
          <div className="lbl">Genre</div>
          <select value={genre} onChange={e=>setGenre(e.target.value)}>
            <option value="">Any Genre</option>
            {genreOptions.map(([id,name])=><option key={id} value={id}>{name}</option>)}
          </select>
        </div>
        <div style={{flex:"1",minWidth:"130px"}}>
          <div className="lbl">Streamer</div>
          <select value={streamer} onChange={e=>setStreamer(e.target.value)}>
            <option value="">Any / Unknown</option>
            {STREAMERS.map(s=><option key={s} value={s}>{s}</option>)}
          </select>
        </div>
        <div style={{flex:"1",minWidth:"170px"}}>
          <div className="lbl" style={{display:"flex",justifyContent:"space-between"}}>
            <span>Min Score</span><span style={{color:"#c8a46a"}}>{minScore.toFixed(1)} &#11088;</span>
          </div>
          <input type="range" min="5.0" max="10.0" step="0.1" value={minScore}
            onChange={e=>setMinScore(parseFloat(e.target.value))}
            style={{width:"100%",background:`linear-gradient(to right,#c8a46a ${pct}%,#1e1e1e ${pct}%)`}}/>
        </div>
        <button className="sbtn" onClick={findMovies} disabled={finding} style={{opacity:finding?0.6:1,minWidth:"110px"}}>
          {finding?"Searching...":"Find Movies"}
        </button>
      </div>
      {finding&&<div style={{textAlign:"center",color:"#444",fontSize:"13px",padding:"40px 0"}}>Searching TMDB...</div>}
      {!finding&&discError&&<div style={{background:"#1a0d0d",border:"1px solid #3a1a1a",borderRadius:"6px",padding:"14px",marginBottom:"16px",fontSize:"12px",color:"#c06060"}}>{discError}</div>}
      {!finding&&discResults.length>0&&(
        <>
          <div style={{fontSize:"10px",color:"#444",letterSpacing:"1.5px",textTransform:"uppercase",marginBottom:"14px"}}>{discResults.length} results &middot; filtered against watchlist</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(148px,1fr))",gap:"14px"}}>
            {discResults.map(movie=>(
              <div key={movie.id} className="card" style={{cursor:"default"}}>
                <div className="pwrap">
                  <img src={`${IMG_BASE}${movie.poster_path}`} alt={movie.title} loading="lazy"/>
                  {streamer&&<div className="catbadge" style={{background:"rgba(0,0,0,.85)",color:STREAMER_COLORS[streamer]||"#c8a46a"}}>{streamer}</div>}
                </div>
                <div style={{padding:"9px 10px 10px"}}>
                  <div style={{fontFamily:"'Playfair Display',serif",fontSize:"12px",fontWeight:700,lineHeight:1.25,marginBottom:"3px",color:"#f0ead8"}}>{movie.title}</div>
                  <div style={{fontSize:"10px",color:"#aaa",marginBottom:"8px"}}>{(movie.release_date||"").slice(0,4)}{movie.vote_average?` &middot; &#11088; ${movie.vote_average.toFixed(1)}`:""}</div>
                  <button onClick={()=>handleAdd(movie)}
                    style={{width:"100%",background:"#c8a46a",color:"#080808",border:"none",borderRadius:"3px",padding:"5px 0",fontFamily:"'DM Sans',sans-serif",fontWeight:600,fontSize:"11px",cursor:"pointer"}}
                    onMouseEnter={e=>e.target.style.background="#debb8a"}
                    onMouseLeave={e=>e.target.style.background="#c8a46a"}>+ Add to Queue</button>
                </div>
              </div>
            ))}
          </div>
        </>
      )}
      {!searched&&<div style={{textAlign:"center",color:"#666",fontSize:"13px",padding:"60px 0",fontFamily:"'Playfair Display',serif",fontStyle:"italic"}}>Set your filters and find something new.</div>}
    </div>
  );
}

// -- AFI Tab -------------------------------------------------------------------
function AfiTab({movies,onAddToQueue,currentUser}){
  const[afiData,setAfiData]=useState({});
  const[loadedCount,setLoadedCount]=useState(0);
  const[filterList,setFilterList]=useState("both");
  const[filterStatus,setFilterStatus]=useState("all");
  const[addedIds,setAddedIds]=useState(new Set());
  const loadStarted=useRef(false);
  const existingMap={};
  movies.forEach(m=>{if(m.tmdbId)existingMap[m.tmdbId]=m;});

  useEffect(()=>{
    if(loadStarted.current)return;loadStarted.current=true;
    (async()=>{
      const results={};
      for(let i=0;i<AFI_LIST.length;i++){
        const[title,year]=AFI_LIST[i];
        try{
          const res=await tmdbFetch(`${TMDB_BASE}/search/movie?query=${encodeURIComponent(title)}&year=${year}&page=1`);
          const data=await res.json();
          const pick=(data.results||[]).find(r=>(r.release_date||"").startsWith(String(year)))||data.results?.[0];
          if(pick)results[`${title}_${year}`]={tmdbId:pick.id,poster:pick.poster_path?`${IMG_BASE}${pick.poster_path}`:null,tmdbRating:pick.vote_average?parseFloat(pick.vote_average.toFixed(1)):null};
        }catch{}
        setLoadedCount(i+1);
        await new Promise(r=>setTimeout(r,60));
      }
      setAfiData(results);
    })();
  },[]);

  const handleAdd=(title,year,key)=>{
    const d=afiData[key];if(!d)return;
    const entry={id:String(Date.now()+Math.floor(Math.random()*10000)),tmdbId:d.tmdbId,title,year:String(year),poster:d.poster,genres:[],primaryGenre:"Other",tmdbRating:d.tmdbRating,overview:"",tagline:"",runtime:null,mediaType:"movie",category:"AFI",seenBy:[],ratings:{},notes:{},streamer:null,addedAt:new Date().toISOString()};
    onAddToQueue(entry);
    setAddedIds(prev=>new Set([...prev,d.tmdbId]));
  };

  const filtered=AFI_LIST.filter(([title,year,r98,r07])=>{
    if(filterList==="1998"&&!r98)return false;
    if(filterList==="2007"&&!r07)return false;
    const d=afiData[`${title}_${year}`];
    const m=d?.tmdbId?existingMap[d.tmdbId]:null;
    const isAdded=d?.tmdbId&&addedIds.has(d.tmdbId);
    const userSeen=m&&m.seenBy?.includes(currentUser);
    if(filterStatus==="unseen")return!m&&!isAdded;
    if(filterStatus==="queued")return m&&!userSeen;
    if(filterStatus==="seen")return userSeen;
    return true;
  });

  const isLoading=Object.keys(afiData).length<AFI_LIST.length;

  return(
    <div style={{padding:"24px"}}>
      <div style={{marginBottom:"20px"}}>
        <div style={{fontFamily:"'Playfair Display',serif",fontSize:"18px",fontWeight:700,marginBottom:"4px"}}>AFI Top 100</div>
        <div style={{fontSize:"11px",color:"#444"}}>Combined 1998 & 2007 &middot; {AFI_LIST.length} films{isLoading&&<span style={{marginLeft:"8px",color:"#c8a46a"}}>&middot; loading {loadedCount}/{AFI_LIST.length}...</span>}</div>
      </div>
      <div style={{display:"flex",gap:"12px",marginBottom:"18px",flexWrap:"wrap"}}>
        <div style={{display:"flex",gap:"5px"}}>
          {[{id:"both",label:"Both"},{id:"1998",label:"1998"},{id:"2007",label:"2007"}].map(f=>(
            <button key={f.id} className={`pill${filterList===f.id?" on":""}`} onClick={()=>setFilterList(f.id)}>{f.label}</button>
          ))}
        </div>
        <div style={{display:"flex",gap:"5px"}}>
          {[{id:"all",label:"All"},{id:"unseen",label:"Not Added"},{id:"queued",label:"Queued"},{id:"seen",label:"Seen"}].map(f=>(
            <button key={f.id} className={`pill${filterStatus===f.id?" on":""}`} onClick={()=>setFilterStatus(f.id)}>{f.label}</button>
          ))}
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(148px,1fr))",gap:"14px"}}>
        {filtered.map(([title,year,r98,r07])=>{
          const key=`${title}_${year}`;const d=afiData[key];
          const m=d?.tmdbId?existingMap[d.tmdbId]:null;
          const isAdded=(d?.tmdbId&&addedIds.has(d.tmdbId))||!!m;
          const isSeen=m&&m.seenBy?.includes(currentUser);
          return(
            <div key={key} className="card" style={{cursor:"default"}}>
              <div className="pwrap">
                {d?.poster?<img src={d.poster} alt={title} loading="lazy"/>:<div className="pph" style={{fontSize:"11px",color:"#888"}}>{isLoading?"...":"&#127916;"}</div>}
                <div className="badge" style={{color:isSeen?"#5aaa5a":isAdded?"#c8a46a":"#444"}}>{isSeen?"&#10003;":isAdded?"&#9675;":"&mdash;"}</div>
                <div style={{position:"absolute",bottom:"6px",left:"6px",display:"flex",flexDirection:"column",gap:"2px"}}>
                  {r98&&<div style={{background:"rgba(0,0,0,.85)",borderRadius:"3px",padding:"1px 5px",fontSize:"8px",color:"#c8a46a",fontWeight:700}}>#{r98} '98</div>}
                  {r07&&<div style={{background:"rgba(0,0,0,.85)",borderRadius:"3px",padding:"1px 5px",fontSize:"8px",color:"#8ab4d4",fontWeight:700}}>#{r07} '07</div>}
                </div>
              </div>
              <div style={{padding:"9px 10px 10px"}}>
                <div style={{fontFamily:"'Playfair Display',serif",fontSize:"11px",fontWeight:700,lineHeight:1.25,marginBottom:"2px",color:"#f0ead8"}}>{title}</div>
                <div style={{fontSize:"9px",color:"#aaa",marginBottom:"8px"}}>{year}{d?.tmdbRating?` &middot; &#11088; ${d.tmdbRating}`:""}</div>
                {!isSeen?(
                  <button onClick={()=>!isAdded&&handleAdd(title,year,key)} disabled={isAdded||!d}
                    style={{width:"100%",background:isAdded?"#1a1a1a":!d?"#111":"#c8a46a",color:isAdded?"#555":!d?"#333":"#080808",border:"none",borderRadius:"3px",padding:"5px 0",fontFamily:"'DM Sans',sans-serif",fontWeight:600,fontSize:"11px",cursor:isAdded||!d?"default":"pointer"}}
                    onMouseEnter={e=>{if(!isAdded&&d)e.target.style.background="#debb8a"}}
                    onMouseLeave={e=>{if(!isAdded&&d)e.target.style.background="#c8a46a"}}>
                    {isAdded?"&#10003; On List":!d?"Loading...":"+ Add to Queue"}
                  </button>
                ):(
                  <div style={{textAlign:"center",fontSize:"11px",color:"#5aaa5a",padding:"4px 0"}}>&#10003; Seen</div>
                )}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// -- Main App ------------------------------------------------------------------
function App(){
  const[currentUser,setCurrentUser]=useState(null);
  const[fbReady,setFbReady]=useState(!!window.__fbReady);
  const[movies,setMovies]=useState([]);
  const[synced,setSynced]=useState(false);
  const[fbError,setFbError]=useState("");
  const[connTested,setConnTested]=useState(false);
  const[loading,setLoading]=useState(false);
  const[loadProgress,setLoadProgress]=useState(0);
  const[loadCurrent,setLoadCurrent]=useState(0);
  const[loadTotal,setLoadTotal]=useState(0);
  const[loadError,setLoadError]=useState("");
  const seedIndexRef=useRef(0);
  const[mainTab,setMainTab]=useState("Watchlist");
  const[activeGenre,setActiveGenre]=useState("All");
  const[activeStatus,setActiveStatus]=useState("all");
  const[activeCategory,setActiveCategory]=useState("All");
  const[activeMedia,setActiveMedia]=useState("all");
  const[query,setQuery]=useState("");
  const[results,setResults]=useState([]);
  const[searching,setSearching]=useState(false);
  const[showDrop,setShowDrop]=useState(false);
  const[editMovie,setEditMovie]=useState(null);
  const[detailMovie,setDetailMovie]=useState(null);
  const searchRef=useRef(null);
  const debounce=useRef(null);
  const seeded=useRef(false);
  const unsubRef=useRef(null);

  // Wait for Firebase
  useEffect(()=>{
    if(window.__fbReady){setFbReady(true);return;}
    const h=()=>setFbReady(true);
    window.addEventListener("fb-ready",h);
    return()=>window.removeEventListener("fb-ready",h);
  },[]);

  // Listen for firebase errors
  useEffect(()=>{
    const h=e=>setFbError(e.detail||"Firebase connection failed");
    window.addEventListener("fb-error",h);
    return()=>window.removeEventListener("fb-error",h);
  },[]);

  // Subscribe to Firestore once Firebase ready
  useEffect(()=>{
    if(!fbReady)return;
    // Test write permission first
    window.__fb.testWrite().then(()=>setConnTested(true)).catch(e=>{
      setFbError("Firestore write blocked: "+e.message+". Check your Firebase rules (set to test mode).");
    });
    unsubRef.current=window.__fb.onMovies(ms=>{
      // Migrate legacy entries that used status:"seen" instead of seenBy array
      const migrated=ms.map(m=>{
        if(!Array.isArray(m.seenBy)){
          const seenBy=m.status==="seen"?["McKylin","Tiffany"]:[];
          return{...m,seenBy,ratings:m.ratings||{},notes:m.notes||{}};
        }
        return{...m,ratings:m.ratings||{},notes:m.notes||{}};
      });
      setMovies(migrated);
      setSynced(true);
      if(ms.length===0&&!seeded.current){seeded.current=true;loadSeed();}
    });
    return()=>unsubRef.current?.();
  },[fbReady]);

  // Click outside search
  useEffect(()=>{
    const h=e=>{if(searchRef.current&&!searchRef.current.contains(e.target)){setResults([]);setShowDrop(false);}};
    document.addEventListener("mousedown",h);return()=>document.removeEventListener("mousedown",h);
  },[]);

  const loadSeed=async(startIndex=0)=>{
    setLoading(true);setLoadError("");
    setLoadTotal(SEED.length);
    for(let i=startIndex;i<SEED.length;i++){
      seedIndexRef.current=i;
      const seed=SEED[i];
      setLoadCurrent(i+1);
      setLoadProgress(Math.round(((i+1)/SEED.length)*100));
      try{
        const ep=seed.mediaType==="movie"?"movie":"tv";
        const controller=new AbortController();
        const timeout=setTimeout(()=>controller.abort(),8000);
        const res=await fetch(`${TMDB_BASE}/search/${ep}?query=${encodeURIComponent(seed.title)}&year=${seed.year}&page=1`,{headers:{Authorization:`Bearer ${TMDB_TOKEN}`},signal:controller.signal});
        clearTimeout(timeout);
        const data=await res.json();const rs=data.results||[];
        let pick=rs.find(r=>(r.release_date||r.first_air_date||"").startsWith(seed.year))||rs[0];
        if(pick){
          try{
            const c2=new AbortController();const t2=setTimeout(()=>c2.abort(),8000);
            const f=await fetch(`${TMDB_BASE}/${ep}/${pick.id}`,{headers:{Authorization:`Bearer ${TMDB_TOKEN}`},signal:c2.signal});
            clearTimeout(t2);pick=await f.json();
          }catch{}
          const entry=buildEntry(seed,pick);
          await window.__fb.upsert(entry);
        }else{
          const entry={id:String(Date.now()+Math.floor(Math.random()*10000)),tmdbId:null,title:seed.title,year:seed.year,poster:null,genres:[],primaryGenre:"Other",tmdbRating:null,overview:"",tagline:"",runtime:null,mediaType:seed.mediaType,category:seed.category,seenBy:seed.seenBy||[],ratings:{},notes:{},streamer:null,addedAt:new Date().toISOString()};
          await window.__fb.upsert(entry);
        }
      }catch(e){
        if(e.name==="AbortError"){
          setLoadError(`Timed out on "${seed.title}". Click Retry to continue from here.`);
          setLoading(false);return;
        }
        console.warn("Seed err",seed.title,e);
        // non-fatal - skip and continue
      }
      await new Promise(r=>setTimeout(r,100));
    }
    setLoadError("");
    setLoading(false);
  };

  const resumeSeed=()=>loadSeed(seedIndexRef.current);

  const doSearch=useCallback((q)=>{
    if(!q.trim()){setResults([]);return;}
    clearTimeout(debounce.current);
    debounce.current=setTimeout(async()=>{
      setSearching(true);
      try{
        const[mv,tv]=await Promise.all([
          tmdbFetch(`${TMDB_BASE}/search/movie?query=${encodeURIComponent(q)}`).then(r=>r.json()),
          tmdbFetch(`${TMDB_BASE}/search/tv?query=${encodeURIComponent(q)}`).then(r=>r.json()),
        ]);
        const combined=[...(mv.results||[]).slice(0,5).map(r=>({...r,_type:"movie"})),...(tv.results||[]).slice(0,3).map(r=>({...r,_type:"tv"}))].sort((a,b)=>b.popularity-a.popularity).slice(0,8);
        setResults(combined);
      }catch{setResults([]);}
      setSearching(false);
    },320);
  },[]);

  const handleInput=e=>{setQuery(e.target.value);setShowDrop(true);doSearch(e.target.value);};

  const addFilm=async r=>{
    if(movies.find(m=>m.tmdbId===r.id)){setResults([]);setQuery("");setShowDrop(false);return;}
    let pick=r;
    try{const f=await tmdbFetch(`${TMDB_BASE}/${r._type}/${r.id}`);pick={...await f.json(),_type:r._type};}catch{}
    const entry=buildEntry({mediaType:r._type,category:"Tiffany",seenBy:[],streamer:null},pick);
    await window.__fb.upsert(entry);
    setResults([]);setQuery("");setShowDrop(false);
  };

  const addToQueue=async entry=>{await window.__fb.upsert(entry);};

  // Toggle seen for current user
  const toggleSeen=async(movieOrId)=>{
    const id=typeof movieOrId==="string"?movieOrId:movieOrId.id;
    // Always get fresh copy from live movies array
    const fresh=movies.find(m=>String(m.id)===String(id))||movieOrId;
    const seenBy=Array.isArray(fresh.seenBy)?fresh.seenBy:[];
    const already=seenBy.includes(currentUser);
    const updated=already?seenBy.filter(u=>u!==currentUser):[...seenBy,currentUser];
    await window.__fb.update(id,{seenBy:updated});
    // Update detail modal if open
    if(detailMovie&&String(detailMovie.id)===String(id)){
      setDetailMovie(m=>({...m,seenBy:updated}));
    }
  };

  const deleteMovie=async id=>{await window.__fb.remove(id);};

  const saveEdit=async(movie,updates)=>{
    await window.__fb.update(movie.id,updates);
    setEditMovie(null);
  };

  const genresInList=["All",...Array.from(new Set(movies.flatMap(m=>m.genres||[]))).sort()];

  // Status filter: "all" | "unseen" (neither seen) | "seen-me" | "seen-both"
  const getMovieStatus=(m)=>{
    const seenBy=m.seenBy||[];
    const meSeen=seenBy.includes(currentUser);
    const otherUser=USERS.find(u=>u!==currentUser);
    const otherSeen=seenBy.includes(otherUser);
    return{meSeen,otherSeen,bothSeen:meSeen&&otherSeen};
  };

  const filtered=movies.filter(m=>{
    const g=activeGenre==="All"||m.genres?.includes(activeGenre);
    const c=activeCategory==="All"||m.category===activeCategory;
    const mt=activeMedia==="all"||m.mediaType===activeMedia;
    const{meSeen,bothSeen}=getMovieStatus(m);
    let s=true;
    if(activeStatus==="unseen")s=!meSeen;
    else if(activeStatus==="seen-me")s=meSeen&&!bothSeen;
    else if(activeStatus==="seen-both")s=bothSeen;
    return g&&s&&c&&mt;
  });

  const counts={
    all:movies.filter(m=>{const g=activeGenre==="All"||m.genres?.includes(activeGenre);const c=activeCategory==="All"||m.category===activeCategory;const mt=activeMedia==="all"||m.mediaType===activeMedia;return g&&c&&mt;}).length,
    unseen:movies.filter(m=>!(m.seenBy||[]).includes(currentUser)).length,
  };

  if(!fbReady)return<div style={{background:"#080808",minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:"#444",fontFamily:"'DM Sans',sans-serif"}}>Connecting...</div>;
  if(!currentUser)return<UserPicker onPick={setCurrentUser}/>;

  const otherUser=USERS.find(u=>u!==currentUser);

  return(
    <div style={{fontFamily:"'DM Sans',sans-serif",background:"#080808",minHeight:"100vh",color:"#ede8df"}}>
      {loading&&(
        <div style={{position:"fixed",inset:0,background:"rgba(10,10,10,.97)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",zIndex:999,gap:"16px",padding:"24px"}}>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:"20px",color:"#f0ead8"}}>Loading the list...</div>
          <div style={{width:"300px",background:"#222",borderRadius:"2px",overflow:"hidden"}}>
            <div className="progress-bar" style={{width:`${loadProgress}%`}}/>
          </div>
          <div style={{fontSize:"11px",color:"#aaa",letterSpacing:"1px"}}>{loadProgress}% -- fetching from TMDB ({loadCurrent}/{loadTotal})</div>
          {loadError&&<div style={{fontSize:"12px",color:"#c06060",maxWidth:"300px",textAlign:"center",lineHeight:1.5}}>{loadError}</div>}
          <div style={{display:"flex",gap:"10px",marginTop:"8px"}}>
            <button onClick={()=>setLoading(false)}
              style={{background:"transparent",border:"1px solid #444",color:"#aaa",padding:"8px 20px",borderRadius:"4px",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontSize:"13px"}}>
              Skip &mdash; use what's loaded
            </button>
            {loadError&&<button onClick={()=>resumeSeed()}
              style={{background:"#c8a46a",border:"none",color:"#0a0a0a",padding:"8px 20px",borderRadius:"4px",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontSize:"13px",fontWeight:600}}>
              Retry
            </button>}
          </div>
          <div style={{fontSize:"10px",color:"#555",maxWidth:"300px",textAlign:"center",lineHeight:1.6}}>
            This only runs once. After it finishes, every visit is instant.
          </div>
        </div>
      )}

      {/* Header */}
      <div style={{borderBottom:"1px solid #222",padding:"18px 24px 0",position:"sticky",top:0,background:"#080808",zIndex:50}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:"12px",flexWrap:"wrap",paddingBottom:"12px"}}>
          <div>
            <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:"22px",fontWeight:700,letterSpacing:"-0.3px"}}>Tiffany's Watchlist</div>
              <div style={{display:"flex",alignItems:"center",gap:"4px"}}>
                <span className="sync-dot" style={{background:synced?"#5aaa5a":"#c8a46a"}}/>
                <span style={{fontSize:"9px",color:"#888",letterSpacing:"1px",textTransform:"uppercase"}}>{synced?"Live":"Syncing..."}</span>
              </div>
            </div>
            <div style={{fontSize:"10px",color:"#888",marginTop:"3px",letterSpacing:"1.5px",textTransform:"uppercase",display:"flex",gap:"12px",alignItems:"center"}}>
              <span>{movies.filter(m=>(m.seenBy||[]).includes(currentUser)).length} seen by you</span>
              <span style={{color:"#555"}}>&middot;</span>
              <span>{movies.filter(m=>(m.seenBy||[]).includes(otherUser)).length} seen by {otherUser}</span>
              <span style={{color:"#555"}}>&middot;</span>
              <span>{movies.length} total</span>
              <button onClick={()=>setCurrentUser(null)} style={{background:"transparent",border:`1px solid ${USER_COLORS[currentUser]}44`,color:USER_COLORS[currentUser],borderRadius:"4px",padding:"2px 8px",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontSize:"9px",letterSpacing:"1px",textTransform:"uppercase"}}>
                {currentUser} &#8595;
              </button>
            </div>
          </div>
          <div style={{position:"relative"}} ref={searchRef}>
            <span className="sicon">&#128269;</span>
            <input className="sinput" placeholder="Search TMDB to add..." value={query} onChange={handleInput} onFocus={()=>query&&setShowDrop(true)}/>
            {showDrop&&(results.length>0||searching)&&(
              <div className="drop">
                {searching&&<div style={{padding:"12px",color:"#444",fontSize:"12px",textAlign:"center"}}>Searching...</div>}
                {results.map(r=>{
                  const added=movies.find(m=>m.tmdbId===r.id);
                  const name=r.title||r.name;const date=r.release_date||r.first_air_date||"";
                  return(
                    <div key={r.id} className="ritem" onClick={()=>!added&&addFilm(r)}>
                      {r.poster_path?<img className="rthumb" src={`https://image.tmdb.org/t/p/w92${r.poster_path}`} alt=""/>:<div className="rthumbph">&#127916;</div>}
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:"13px",fontWeight:500,color:added?"#3a3a3a":"#ede8df",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{name}</div>
                        <div style={{fontSize:"10px",color:"#999",marginTop:"2px"}}>{date.slice(0,4)} &middot; {r._type==="tv"?"TV":"Film"} &middot; &#11088;{r.vote_average?.toFixed(1)}</div>
                      </div>
                      {added&&<span style={{fontSize:"10px",color:"#3a3a3a",marginLeft:"8px",whiteSpace:"nowrap"}}>&#10003; Added</span>}
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        </div>

        {/* Main tabs */}
        <div style={{display:"flex",borderTop:"1px solid #222",marginLeft:"-24px",marginRight:"-24px",paddingLeft:"24px",overflowX:"auto"}}>
          {MAIN_TABS.map(t=>(
            <button key={t} className={`maintab${mainTab===t?" on":""}`} onClick={()=>setMainTab(t)}>
              {t==="Discover"?"&#10022; Discover":t==="AFI 100"?"&#9733; AFI 100":t}
            </button>
          ))}
        </div>

        {mainTab==="Watchlist"&&(
          <>
            <div style={{display:"flex",gap:"16px",marginTop:"10px",alignItems:"center",flexWrap:"wrap"}}>
              <div style={{display:"flex",gap:"5px"}}>
                {[{id:"all",label:"All"},{id:"movie",label:"&#127916; Films"},{id:"tv",label:"&#128250; TV"}].map(m=>(
                  <button key={m.id} className={`pill${activeMedia===m.id?" on":""}`} onClick={()=>setActiveMedia(m.id)}>{m.label}</button>
                ))}
              </div>
              <div style={{width:"1px",height:"16px",background:"#1e1e1e"}}/>
              <div style={{display:"flex",gap:"5px"}}>
                {CATEGORIES.map(c=><button key={c} className={`pill${activeCategory===c?" on":""}`} onClick={()=>setActiveCategory(c)}>{c}</button>)}
              </div>
            </div>
            <div style={{display:"flex",gap:"5px",marginTop:"8px",overflowX:"auto",paddingBottom:"10px"}}>
              {genresInList.map(g=><button key={g} className={`pill${activeGenre===g?" on":""}`} onClick={()=>setActiveGenre(g)}>{g}</button>)}
            </div>
          </>
        )}
      </div>

      {mainTab==="Watchlist"&&(
        <>
          <div style={{padding:"0 24px",display:"flex",borderBottom:"1px solid #222",overflowX:"auto"}}>
            {[
              {id:"all",label:"All",count:counts.all},
              {id:"unseen",label:"Not Seen by Me",count:counts.unseen},
              {id:"seen-me",label:"Seen by Me",count:movies.filter(m=>{const s=m.seenBy||[];return s.includes(currentUser)&&!s.includes(otherUser);}).length},
              {id:"seen-both",label:"Both Seen",count:movies.filter(m=>(m.seenBy||[]).includes(currentUser)&&(m.seenBy||[]).includes(otherUser)).length},
            ].map(s=>(
              <button key={s.id} className={`stab${activeStatus===s.id?" on":""}`} onClick={()=>setActiveStatus(s.id)} style={{whiteSpace:"nowrap"}}>
                {s.label} <span style={{color:"#222",fontSize:"10px",marginLeft:"3px"}}>{s.count}</span>
              </button>
            ))}
          </div>

          <div style={{padding:"20px 24px",display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(140px,1fr))",gap:"12px"}}>
            {filtered.length===0&&<div style={{gridColumn:"1/-1",textAlign:"center",color:"#666",padding:"80px 0",fontSize:"13px"}}>{!synced?"Connecting to Firebase...":"No films match this filter."}</div>}
            {filtered.map(movie=>{
              const{meSeen,otherSeen}=getMovieStatus(movie);
              return(
                <div key={movie.id} className="card" style={{cursor:"pointer"}} onClick={()=>setDetailMovie(movie)}>
                  <div className="pwrap">
                    {movie.poster?<img src={movie.poster} alt={movie.title} loading="lazy"/>:<div className="pph">&#127916;</div>}
                    {/* Seen badges &mdash; top right */}
                    <div style={{position:"absolute",top:"6px",right:"6px",display:"flex",flexDirection:"column",gap:"2px",alignItems:"flex-end"}}>
                      {meSeen&&<div style={{background:"rgba(0,0,0,.85)",borderRadius:"3px",padding:"1px 5px",fontSize:"8px",fontWeight:700,color:USER_COLORS[currentUser]}}>&#10003; {currentUser.slice(0,3)}</div>}
                      {otherSeen&&<div style={{background:"rgba(0,0,0,.85)",borderRadius:"3px",padding:"1px 5px",fontSize:"8px",fontWeight:700,color:USER_COLORS[otherUser]}}>&#10003; {otherUser.slice(0,3)}</div>}
                      {!meSeen&&!otherSeen&&<div style={{background:"rgba(0,0,0,.85)",borderRadius:"3px",padding:"1px 5px",fontSize:"8px",fontWeight:700,color:"#444"}}>&#9675;</div>}
                    </div>
                    {movie.category&&movie.category!=="Tiffany"&&(
                      <div className="catbadge" style={{background:movie.category==="Heist"?"rgba(180,100,40,.85)":movie.category==="Maybe"?"rgba(80,80,80,.85)":movie.category==="AFI"?"rgba(120,80,180,.85)":"rgba(40,80,160,.85)",color:"#fff"}}>{movie.category}</div>
                    )}
                    {movie.streamer&&<div className="streamerbadge" style={{color:STREAMER_COLORS[movie.streamer]||"#c8a46a"}}>{movie.streamer}</div>}
                  </div>
                  <div style={{padding:"8px 9px"}}>
                    <div style={{fontFamily:"'Playfair Display',serif",fontSize:"11px",fontWeight:700,lineHeight:1.25,marginBottom:"2px",color:"#f0ead8"}}>{movie.title}</div>
                    <div style={{fontSize:"9px",color:"#aaa"}}>{movie.year}{movie.tmdbRating?` &middot; &#11088;${movie.tmdbRating}`:""}</div>
                    {movie.mediaType==="tv"&&<div style={{fontSize:"8px",color:"#7aafee",marginTop:"2px",textTransform:"uppercase",letterSpacing:".5px"}}>TV</div>}
                  </div>
                </div>
              );
            })}
          </div>
        </>
      )}

      {mainTab==="Discover"&&<DiscoverTab movies={movies} onAddToQueue={addToQueue}/>}
      {mainTab==="AFI 100"&&<AfiTab movies={movies} onAddToQueue={addToQueue} currentUser={currentUser}/>}

      {/* Detail modal */}
      {detailMovie&&(()=>{
        const{meSeen,otherSeen}=getMovieStatus(detailMovie);
        const otherUser=USERS.find(u=>u!==currentUser);
        return(
          <div className="mov" onClick={()=>setDetailMovie(null)}>
            <div className="mbox wide" onClick={e=>e.stopPropagation()}>
              <div style={{display:"flex",overflow:"hidden",borderRadius:"10px"}}>
                <div style={{width:"160px",flexShrink:0}}>
                  {detailMovie.poster?<img src={detailMovie.poster} alt="" style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}/>:<div style={{width:"100%",minHeight:"240px",background:"#111",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"36px"}}>&#127916;</div>}
                </div>
                <div style={{flex:1,padding:"18px 16px",display:"flex",flexDirection:"column",gap:"10px",minWidth:0}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                    <div>
                      <div style={{fontFamily:"'Playfair Display',serif",fontSize:"17px",fontWeight:700,lineHeight:1.2}}>{detailMovie.title}</div>
                      <div style={{fontSize:"11px",color:"#aaa",marginTop:"3px"}}>{detailMovie.year}{detailMovie.runtime?` &middot; ${detailMovie.runtime}m`:""}{detailMovie.tmdbRating?` &middot; &#11088; ${detailMovie.tmdbRating}`:""}{detailMovie.mediaType==="tv"&&<span style={{color:"#5a8fc8",marginLeft:"6px"}}>TV</span>}</div>
                      {detailMovie.streamer&&<div style={{marginTop:"4px",fontSize:"10px",color:STREAMER_COLORS[detailMovie.streamer]||"#c8a46a",fontWeight:600}}>{detailMovie.streamer}</div>}
                    </div>
                    <div style={{display:"flex",gap:"2px"}}>
                      <button className="ibt" onClick={()=>{setEditMovie({...detailMovie});setDetailMovie(null);}}>&#9999;</button>
                      <button className="ibt del" onClick={()=>{deleteMovie(detailMovie.id);setDetailMovie(null);}}>&#10005;</button>
                    </div>
                  </div>

                  {/* Per-user seen status */}
                  <div style={{display:"flex",gap:"8px"}}>
                    {USERS.map(u=>{
                      const seen=(detailMovie.seenBy||[]).includes(u);
                      const isMe=u===currentUser;
                      return(
                        <button key={u} onClick={()=>isMe&&toggleSeen(detailMovie.id)}
                          style={{flex:1,background:seen?`${USER_COLORS[u]}22`:"#111",border:`1px solid ${seen?USER_COLORS[u]:"#222"}`,borderRadius:"4px",padding:"6px 8px",cursor:isMe?"pointer":"default",transition:"all .15s",fontFamily:"'DM Sans',sans-serif"}}>
                          <div style={{fontSize:"10px",fontWeight:600,color:seen?USER_COLORS[u]:"#444"}}>{u}</div>
                          <div style={{fontSize:"11px",marginTop:"2px",color:seen?"#5aaa5a":"#555"}}>{seen?"&#10003; Seen":"&#9675; Queue"}</div>
                          {isMe&&<div style={{fontSize:"8px",color:"#333",marginTop:"2px"}}>tap to toggle</div>}
                        </button>
                      );
                    })}
                  </div>

                  {detailMovie.genres?.length>0&&<div style={{display:"flex",gap:"4px",flexWrap:"wrap"}}>{detailMovie.genres.map(g=><span key={g} style={{background:"#141414",border:"1px solid #1e1e1e",borderRadius:"3px",padding:"2px 6px",fontSize:"9px",color:"#999",textTransform:"uppercase",letterSpacing:".5px"}}>{g}</span>)}</div>}
                  {detailMovie.tagline&&<div style={{fontFamily:"'Playfair Display',serif",fontStyle:"italic",fontSize:"11px",color:"#444"}}>"{detailMovie.tagline}"</div>}
                  {detailMovie.overview&&<div style={{fontSize:"11px",color:"#bbb",lineHeight:1.65,display:"-webkit-box",WebkitLineClamp:3,WebkitBoxOrient:"vertical",overflow:"hidden"}}>{detailMovie.overview}</div>}

                  {/* Per-user ratings */}
                  <div style={{display:"flex",gap:"8px"}}>
                    {USERS.map(u=>{
                      const r=(detailMovie.ratings||{})[u]||0;
                      const isMe=u===currentUser;
                      return(
                        <div key={u} style={{flex:1}}>
                          <div style={{fontSize:"9px",color:USER_COLORS[u],marginBottom:"3px",fontWeight:600}}>{u}'s rating</div>
                          <div style={{display:"flex",gap:"2px"}}>
                            {[1,2,3,4,5].map(n=>(
                              <span key={n} onClick={()=>{if(!isMe)return;const updated={...(detailMovie.ratings||{}),[u]:n};window.__fb.update(detailMovie.id,{ratings:updated});setDetailMovie(m=>({...m,ratings:updated}));}}
                                style={{fontSize:"16px",cursor:isMe?"pointer":"default",color:r>=n?USER_COLORS[u]:"#1e1e1e",transition:"transform .1s"}}
                                onMouseEnter={e=>{if(isMe)e.target.style.transform="scale(1.2)";}}
                                onMouseLeave={e=>e.target.style.transform="scale(1)"}>&#9733;</span>
                            ))}
                          </div>
                        </div>
                      );
                    })}
                  </div>

                  {/* Notes */}
                  {Object.entries(detailMovie.notes||{}).map(([u,note])=>note?(
                    <div key={u} style={{fontSize:"11px",color:"#666",fontStyle:"italic",borderLeft:`2px solid ${USER_COLORS[u]}44`,paddingLeft:"9px"}}>
                      <span style={{color:USER_COLORS[u],fontStyle:"normal",fontWeight:600,fontSize:"9px",display:"block",marginBottom:"2px"}}>{u}</span>
                      "{note}"
                    </div>
                  ):null)}
                </div>
              </div>
            </div>
          </div>
        );
      })()}

      {/* Edit modal */}
      {editMovie&&(
        <div className="mov" onClick={()=>setEditMovie(null)}>
          <div className="mbox" style={{padding:"24px"}} onClick={e=>e.stopPropagation()}>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:"17px",fontWeight:700,marginBottom:"18px"}}>{editMovie.title}</div>
            <div style={{display:"flex",flexDirection:"column",gap:"13px"}}>
              <div><div className="lbl">Category</div>
                <select value={editMovie.category} onChange={e=>setEditMovie(m=>({...m,category:e.target.value}))}>
                  {[...CATEGORIES.filter(c=>c!=="All"),"AFI"].map(c=><option key={c} value={c}>{c}</option>)}
                </select>
              </div>
              <div><div className="lbl">Streamer</div>
                <select value={editMovie.streamer||""} onChange={e=>setEditMovie(m=>({...m,streamer:e.target.value||null}))}>
                  <option value="">None</option>{STREAMERS.map(s=><option key={s} value={s}>{s}</option>)}
                </select>
              </div>
              <div><div className="lbl">Your Note</div>
                <textarea rows={3} placeholder="Your thoughts..." value={(editMovie.notes||{})[currentUser]||""} onChange={e=>setEditMovie(m=>({...m,notes:{...(m.notes||{}),[currentUser]:e.target.value}}))}/>
              </div>
            </div>
            <div style={{display:"flex",gap:"9px",marginTop:"20px",justifyContent:"flex-end"}}>
              <button className="cbt" onClick={()=>setEditMovie(null)}>Cancel</button>
              <button className="sbtn" onClick={()=>saveEdit(editMovie,{category:editMovie.category,streamer:editMovie.streamer,notes:editMovie.notes||{}})}>Save</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
